services:
  postgres:
    image: postgres:16-alpine
    container_name: aiwms-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aiwms
      POSTGRES_PASSWORD: aiwms
      POSTGRES_DB: aiwms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiwms -d aiwms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
