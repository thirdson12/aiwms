# Render Blueprint — AIWMS
# https://render.com/docs/blueprint-spec

databases:
  - name: aiwms-db
    plan: free
    databaseName: aiwms
    user: aiwms

services:
  - type: web
    name: aiwms-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: corepack enable && corepack prepare pnpm@9.15.0 --activate && NODE_ENV=development pnpm install --frozen-lockfile && pnpm render:build:api
    startCommand: pnpm render:start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aiwms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: aiwms-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: aiwms-web
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: corepack enable && corepack prepare pnpm@9.15.0 --activate && NODE_ENV=development pnpm install --frozen-lockfile && pnpm render:build:web
    startCommand: pnpm render:start:web
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        fromService:
          type: web
          name: aiwms-api
          envVarKey: RENDER_EXTERNAL_URL
