# Render Blueprint — AIWMS
# https://render.com/docs/blueprint-spec

databases:
  - name: aiwms-db
    plan: free
    databaseName: aiwms
    user: aiwms

services:
  - type: web
    name: aiwms-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile.api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aiwms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: aiwms-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: aiwms-web
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile.web
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        fromService:
          type: web
          name: aiwms-api
          envVarKey: RENDER_EXTERNAL_URL
